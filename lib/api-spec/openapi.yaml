openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: BingX Futures Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bingx
    description: BingX Futures API proxy
  - name: bot
    description: Scalp bot configuration and execution
  - name: demo
    description: Demo/VST trading lab — test sniper edge with BingX demo keys
  - name: telemetry
    description: Adaptive edge telemetry and learning
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bingx/connect:
    post:
      operationId: connectBingX
      tags: [bingx]
      summary: Connect to BingX with API credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BingXCredentials"
      responses:
        "200":
          description: Connection successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectResult"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /bingx/balance:
    get:
      operationId: getBingXBalance
      tags: [bingx]
      summary: Get futures wallet balance
      responses:
        "200":
          description: Wallet balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletBalance"
        "401":
          description: Not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /bingx/positions:
    get:
      operationId: getBingXPositions
      tags: [bingx]
      summary: Get open futures positions
      responses:
        "200":
          description: List of open positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Position"
        "401":
          description: Not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /bingx/orders:
    get:
      operationId: getBingXOrders
      tags: [bingx]
      summary: Get recent futures orders
      parameters:
        - name: symbol
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /bingx/summary:
    get:
      operationId: getBingXSummary
      tags: [bingx]
      summary: Dashboard summary
      responses:
        "200":
          description: Summary data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          description: Not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /bingx/market/ticker:
    get:
      operationId: getBingXTicker
      tags: [bingx]
      summary: Get 24hr ticker for a symbol (public)
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ticker data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticker"

  /bingx/disconnect:
    post:
      operationId: disconnectBingX
      tags: [bingx]
      summary: Disconnect from BingX
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisconnectResult"

  /bot/config:
    get:
      operationId: getBotConfig
      tags: [bot]
      summary: Get current bot configuration (from ENV)
      responses:
        "200":
          description: Bot configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotConfig"

  /bot/order:
    post:
      operationId: placeBotOrder
      tags: [bot]
      summary: Place a scalp entry order with all gate checks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderRequest"
      responses:
        "200":
          description: Order placed or rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResult"
        "401":
          description: Not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Gate reject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResult"

  /bot/close:
    post:
      operationId: closeBotPosition
      tags: [bot]
      summary: Close an open position
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseRequest"
      responses:
        "200":
          description: Close order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResult"
        "401":
          description: Not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /bot/modes:
    get:
      operationId: getBotModes
      tags: [bot]
      summary: List all execution mode presets and the currently active mode
      responses:
        "200":
          description: Mode presets with active mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotModesResponse"

  /bot/mode:
    post:
      operationId: setBotMode
      tags: [bot]
      summary: Activate an execution mode — applies leverage/margin/marginType overrides
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetModeRequest"
      responses:
        "200":
          description: Activated mode and resulting config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetModeResponse"

  /bot/mode/reset:
    post:
      operationId: resetBotMode
      tags: [bot]
      summary: Clear active mode and all overrides — config reverts to ENV
      responses:
        "200":
          description: Config after reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetModeResponse"

  /bot/order/bulk:
    post:
      operationId: postBotOrderBulk
      tags: [bot]
      summary: Bulk order execution — rate-limited via token bucket (max 10 orders/s)
      description: |
        Accepts up to 50 orders in one request. Executes them sequentially through
        a token-bucket rate limiter capped at the BingX API limit (10 orders/second).
        Each order runs through the full gate pipeline before reaching the exchange.
        Designed for Aggressive mode (5 USDT × 18× / isolated × bulk throughput).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkOrderRequest"
      responses:
        "200":
          description: Bulk execution summary with per-order results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkExecutionSummary"

  /bot/config/override:
    patch:
      operationId: patchBotConfig
      tags: [bot]
      summary: Apply runtime overrides to bot config (in-memory, cleared on restart)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotConfigPatch"
      responses:
        "200":
          description: Updated config with overrides applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotConfig"

  /bot/config/override/reset:
    post:
      operationId: resetBotConfigOverrides
      tags: [bot]
      summary: Clear all runtime overrides — config reverts to ENV values
      responses:
        "200":
          description: Config after reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotConfig"

  /bot/edge:
    get:
      operationId: getBotEdge
      tags: [bot]
      summary: Full Edge Telemetry — candle indicators + adaptive EWMA per symbol
      description: |
        Fetches OHLCV candles (5m default) for all SCALP_SYMBOLS and computes:
        EMA9/21 crossover, RSI14, ATR14, volume surge ratio.
        Fuses candle market score with adaptive EWMA telemetry (win rate, EV, priority/toxicity).
        Returns per-symbol combined edge score for LONG and SHORT, ATR-based TP/SL suggestions,
        and global telemetry state. Results are cached 30s per symbol.
        Poll at 30–60s intervals for live edge monitoring.
      parameters:
        - name: interval
          in: query
          required: false
          schema:
            type: string
            enum: [1m, 3m, 5m, 15m]
          description: Candle interval for indicator computation. Default 5m.
        - name: btcChangePct
          in: query
          required: false
          schema:
            type: number
          description: BTC 24h % change for regime detection.
      responses:
        "200":
          description: Edge telemetry for all configured symbols
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EdgeResult"

  /bot/scan:
    get:
      operationId: getBotScan
      tags: [bot]
      summary: Scan all configured symbols — parallel ticker fetch, gate checks, adaptive ranking
      description: |
        Fetches tickers for all symbols in SCALP_SYMBOLS in parallel (public endpoint).
        Applies hour blacklist, toxicity gate, BTC regime gate, and adaptive scoring.
        Returns symbols sorted by rankingScore descending. Use btcChangePct from the BTC ticker.
        Poll at 5–10s intervals; up to 10 orders/second can be placed for top candidates.
      parameters:
        - name: btcChangePct
          in: query
          required: false
          schema:
            type: number
          description: BTC 24h % change for regime detection (positive = BULL, negative = BEAR)
        - name: positionSide
          in: query
          required: false
          schema:
            type: string
            enum: [LONG, SHORT, BOTH]
          description: Filter scan to one direction. Defaults to BOTH.
      responses:
        "200":
          description: Scan result with all configured symbols ranked by adaptive score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"

  /demo/connect:
    post:
      operationId: connectDemo
      tags: [demo]
      summary: Activate demo VST mode using existing session credentials
      responses:
        "200":
          description: Demo connection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoStatus"
        "401":
          description: Invalid demo credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /demo/disconnect:
    post:
      operationId: disconnectDemo
      tags: [demo]
      summary: Disconnect demo account
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisconnectResult"

  /demo/status:
    get:
      operationId: getDemoStatus
      tags: [demo]
      summary: Get demo account connection status and balance
      responses:
        "200":
          description: Demo status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoStatus"

  /demo/analysis-state:
    get:
      operationId: getDemoAnalysisState
      tags: [demo]
      summary: Read-only consolidated demo account state and demo-scoped telemetry
      responses:
        "200":
          description: Demo account plus telemetry state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoAnalysisState"

  /demo/order:
    post:
      operationId: placeDemoOrder
      tags: [demo]
      summary: Run full gate pipeline and optionally fire order on demo account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DemoOrderRequest"
      responses:
        "200":
          description: Gate evaluation result (and order if execute=true)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResult"
        "401":
          description: Demo not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Gate reject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResult"

  /demo/close:
    post:
      operationId: closeDemoPosition
      tags: [demo]
      summary: Close an open demo position
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseRequest"
      responses:
        "200":
          description: Close result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResult"
        "401":
          description: Demo not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /telemetry/state:
    get:
      operationId: getTelemetryState
      tags: [telemetry]
      parameters:
        - name: source
          in: query
          required: false
          schema:
            type: string
            enum: [all, demo, live]
      summary: Full adaptive engine state — symbol profiles, cluster profiles, hour toxicity, gate recommendation
      responses:
        "200":
          description: Adaptive engine state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelemetryState"

  /telemetry/recommendation:
    get:
      operationId: getTelemetryRecommendation
      tags: [telemetry]
      summary: Adaptive gate recommendation based on realized telemetry
      responses:
        "200":
          description: Gate recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateRecommendation"

  /telemetry/outcome:
    post:
      operationId: recordTelemetryOutcome
      tags: [telemetry]
      summary: Record a realized trade outcome — updates EWMA state and cluster profiles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeOutcomeInput"
      responses:
        "200":
          description: Outcome recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordOutcomeResult"

  /telemetry/context:
    get:
      operationId: getTelemetryContext
      tags: [telemetry]
      summary: ContextSignal for a specific entry cluster (symbol+side+hour+regime)
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: positionSide
          in: query
          required: true
          schema:
            type: string
        - name: hourUtc
          in: query
          required: true
          schema:
            type: integer
        - name: btcRegime
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Context signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextSignal"

  /telemetry/rank:
    get:
      operationId: getTelemetryRank
      tags: [telemetry]
      summary: Ranking score for a pending entry — combines EV and context signal
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: positionSide
          in: query
          required: true
          schema:
            type: string
        - name: hourUtc
          in: query
          required: true
          schema:
            type: integer
        - name: btcRegime
          in: query
          required: true
          schema:
            type: string
        - name: currentEv
          in: query
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Ranking score and context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RankResult"

  /telemetry/export:
    get:
      operationId: exportTelemetry
      tags: [telemetry]
      summary: Export all raw trade outcomes as JSON array
      responses:
        "200":
          description: All outcomes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeOutcomeInput"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ApiError:
      type: object
      properties:
        error:
          type: string
      required: [error]

    BingXCredentials:
      type: object
      properties:
        apiKey:
          type: string
        secretKey:
          type: string
      required: [apiKey, secretKey]

    ConnectResult:
      type: object
      properties:
        connected:
          type: boolean
        uid:
          type: ["string", "null"]
        displayName:
          type: ["string", "null"]
      required: [connected]

    DisconnectResult:
      type: object
      properties:
        disconnected:
          type: boolean
      required: [disconnected]

    WalletBalance:
      type: object
      properties:
        totalWalletBalance:
          type: string
        totalUnrealizedProfit:
          type: string
        totalMarginBalance:
          type: string
        availableBalance:
          type: string
        totalPositionInitialMargin:
          type: string
        currency:
          type: string
      required:
        - totalWalletBalance
        - totalUnrealizedProfit
        - totalMarginBalance
        - availableBalance
        - totalPositionInitialMargin
        - currency

    Position:
      type: object
      properties:
        symbol:
          type: string
        positionSide:
          type: string
        positionAmt:
          type: string
        entryPrice:
          type: string
        markPrice:
          type: string
        unrealizedProfit:
          type: string
        liquidationPrice:
          type: string
        leverage:
          type: string
        marginType:
          type: string
        initialMargin:
          type: string
      required:
        - symbol
        - positionSide
        - positionAmt
        - entryPrice
        - markPrice
        - unrealizedProfit
        - leverage
        - marginType

    Order:
      type: object
      properties:
        orderId:
          type: string
        symbol:
          type: string
        side:
          type: string
        positionSide:
          type: string
        type:
          type: string
        origQty:
          type: string
        price:
          type: string
        avgPrice:
          type: string
        stopPrice:
          type: ["string", "null"]
        status:
          type: string
        time:
          type: integer
        profit:
          type: ["string", "null"]
        commission:
          type: ["string", "null"]
      required:
        - orderId
        - symbol
        - side
        - positionSide
        - type
        - origQty
        - price
        - avgPrice
        - status
        - time

    Ticker:
      type: object
      properties:
        symbol:
          type: string
        lastPrice:
          type: string
        priceChange:
          type: string
        priceChangePercent:
          type: string
        highPrice:
          type: string
        lowPrice:
          type: string
        volume:
          type: string
        quoteVolume:
          type: string
      required:
        - symbol
        - lastPrice
        - priceChange
        - priceChangePercent
        - highPrice
        - lowPrice
        - volume
        - quoteVolume

    DashboardSummary:
      type: object
      properties:
        connected:
          type: boolean
        totalBalance:
          type: string
        availableBalance:
          type: string
        totalUnrealizedPnl:
          type: string
        openPositionsCount:
          type: integer
        totalMarginUsed:
          type: string
        currency:
          type: string
      required:
        - connected
        - totalBalance
        - availableBalance
        - totalUnrealizedPnl
        - openPositionsCount
        - totalMarginUsed
        - currency

    DemoStatus:
      type: object
      properties:
        connected:
          type: boolean
        balance:
          type: string
        equity:
          type: string
        availableBalance:
          type: string
        usedMargin:
          type: string
        unrealizedPnl:
          type: string
        openUnrealizedPnl:
          type: number
        openPositionsCount:
          type: integer
        positions:
          type: array
          items:
            $ref: "#/components/schemas/DemoPosition"
        positionsConfirmed:
          type: boolean
        currency:
          type: string
        error:
          type: string
      required: [connected]

    DemoPosition:
      type: object
      properties:
        symbol:
          type: string
        positionSide:
          type: string
        positionAmt:
          type: string
        availableAmt:
          type: string
        avgPrice:
          type: string
        markPrice:
          type: string
        unrealizedProfit:
          type: string
        leverage:
          type: integer
        margin:
          type: string
        liquidationPrice:
          type: string
        entryTime:
          type: integer
        metadata:
          type: object
          additionalProperties: true
      required: [symbol, positionSide, positionAmt, availableAmt, avgPrice, unrealizedProfit]

    DemoAnalysisState:
      type: object
      properties:
        connected:
          type: boolean
        balance:
          type: string
        equity:
          type: string
        availableBalance:
          type: string
        usedMargin:
          type: string
        unrealizedPnl:
          type: string
        openUnrealizedPnl:
          type: number
        openPositionsCount:
          type: integer
        positions:
          type: array
          items:
            $ref: "#/components/schemas/DemoPosition"
        positionsConfirmed:
          type: boolean
        currency:
          type: string
        telemetry:
          $ref: "#/components/schemas/TelemetryState"
        error:
          type: string
      required: [connected, positions, openUnrealizedPnl, telemetry]

    DemoOrderRequest:
      type: object
      properties:
        symbol:
          type: string
        side:
          type: string
          enum: [BUY, SELL]
        positionSide:
          type: string
          enum: [LONG, SHORT]
        quantity:
          type: number
        currentEv:
          type: number
        currentWinRate:
          type: number
        currentProfitFactor:
          type: number
        btcChangePct:
          type: number
        execute:
          type: boolean
          description: If true and all gates pass, send order to BingX demo account
      required: [symbol, side, positionSide]

    BotModePreset:
      type: object
      properties:
        id:
          type: string
          enum: [easy, standard, aggressive]
        label:
          type: string
        badge:
          type: string
        description:
          type: string
        leverage:
          type: number
        marginPerTrade:
          type: number
        marginType:
          type: string
        bulkExecution:
          type: boolean
        maxOrdersPerSecond:
          type: number
        color:
          type: string
        riskNote:
          type: string
      required: [id, label, badge, description, leverage, marginPerTrade, marginType, bulkExecution, maxOrdersPerSecond, color, riskNote]

    BotModesResponse:
      type: object
      properties:
        modes:
          type: array
          items:
            $ref: "#/components/schemas/BotModePreset"
        activeMode:
          type: string
          nullable: true
      required: [modes, activeMode]

    SetModeRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [easy, standard, aggressive]
      required: [mode]

    SetModeResponse:
      type: object
      properties:
        activeMode:
          type: string
          nullable: true
        preset:
          $ref: "#/components/schemas/BotModePreset"
        config:
          $ref: "#/components/schemas/BotConfig"
      required: [activeMode, config]

    BulkOrderItem:
      type: object
      properties:
        symbol:
          type: string
        side:
          type: string
          enum: [BUY, SELL]
        positionSide:
          type: string
          enum: [LONG, SHORT]
        quantity:
          type: number
        btcChangePct:
          type: number
      required: [symbol, side, positionSide]

    BulkOrderResult:
      type: object
      properties:
        index:
          type: integer
        symbol:
          type: string
        side:
          type: string
        placed:
          type: boolean
        orderId:
          type: string
          nullable: true
        quantity:
          type: number
          nullable: true
        gateRejects:
          type: array
          items:
            type: string
        observationMode:
          type: boolean
        message:
          type: string
        durationMs:
          type: number
      required: [index, symbol, side, placed, orderId, quantity, gateRejects, observationMode, message, durationMs]

    BulkOrderRequest:
      type: object
      properties:
        orders:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/BulkOrderItem"
        ordersPerSecond:
          type: number
          minimum: 1
          maximum: 10
          description: Token-bucket rate cap. Defaults to 10 (BingX max).
      required: [orders]

    BulkExecutionSummary:
      type: object
      properties:
        mode:
          type: string
        total:
          type: integer
        placed:
          type: integer
        rejected:
